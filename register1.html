<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản - Tìm Kiếm Bất Động Sản</title>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#2563EB',
                        background: '#F8FAFC',
                        surface: '#FFFFFF',
                        border: '#E2E8F0',
                        textPrimary: '#0F172A',
                        textSecondary: '#64748B',
                        success: '#16A34A',
                        warning: '#F59E0B',
                        error: '#DC2626',
                    },
                    borderRadius: {
                        'input': '10px',
                        'button': '12px',
                        'card': '16px',
                        'modal': '20px',
                    },
                    boxShadow: {
                        'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                    },
                    fontSize: {
                        'small': ['12px', '16px'],
                        'body': ['14px', '20px'],
                        'h3': ['20px', '28px'],
                        'h2': ['24px', '32px'],
                        'h1': ['32px', '40px'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0F172A;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-0 sm:p-4 text-textPrimary">

    <!-- Mobile Device Container -->
    <div class="w-full max-w-[430px] h-screen sm:h-[880px] bg-background sm:rounded-modal shadow-2xl relative flex flex-col justify-between overflow-hidden border border-border p-6">
        
        <!-- Top Section: Navigation & Header -->
        <div class="space-y-6">
            <button onclick="parent.switchScreen('login')" class="w-[44px] h-[44px] flex items-center justify-center bg-surface border border-border rounded-input text-textPrimary hover:bg-slate-50 transition-colors duration-150 shadow-soft">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            
            <div class="space-y-2">
                <h1 class="text-h2 font-semibold text-textPrimary">Tạo tài khoản mới</h1>
                <p class="text-body text-textSecondary">Vui lòng điền thông tin bên dưới để gửi yêu cầu tạo tài khoản cho admin phê duyệt.</p>
            </div>
        </div>

        <!-- Middle Section: Register Form -->
        <div class="flex-1 flex flex-col justify-center max-y-[300px] my-auto space-y-5">
            <!-- Email Input -->
            <div class="space-y-1.5">
                <label class="text-small font-medium text-textPrimary">Tài khoản email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-textSecondary">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </span>
                    <input type="email" placeholder="name@example.com" class="w-full pl-10 pr-4 py-3 bg-surface border border-border rounded-input text-body focus:outline-none focus:border-primary transition-colors duration-150 placeholder:text-textSecondary text-textPrimary shadow-soft">
                </div>
            </div>

            <!-- Submit Button -->
            <div class="pt-2">
                <button onclick="parent.switchScreen('login')" class="w-full py-3 bg-primary text-white font-semibold text-body rounded-button shadow-soft hover:bg-blue-700 transition-colors duration-150 flex items-center justify-center gap-2 group">
                    <span>Gửi yêu cầu</span>
                    <i data-lucide="send" class="w-4 h-4 transition-transform duration-150 group-hover:translate-x-0.5 group-hover:-translate-y-0.5"></i>
                </button>
            </div>
        </div>

        <!-- Bottom Section: Footer / Back to Login -->
        <div class="pb-4 pt-4 mt-16 text-center">
            <p class="text-body text-textSecondary">
                Đã có tài khoản? 
                <button onclick="parent.switchScreen('login')" class="text-primary font-semibold hover:underline transition-all duration-150 ml-1">Đăng nhập</button>
            </p>
        </div>

    </div>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
