<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ Đăng Ký - MQ Sale</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#2563EB',
                        background: '#F8FAFC',
                        surface: '#FFFFFF',
                        border: '#E2E8F0',
                        textPrimary: '#0F172A',
                        textSecondary: '#64748B',
                        success: '#16A34A',
                        warning: '#F59E0B',
                        error: '#DC2626',
                    },
                    borderRadius: { input: '10px', button: '12px', card: '16px', modal: '20px' },
                    boxShadow: { soft: '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)' },
                    fontSize: { small: ['12px', '16px'], body: ['14px', '20px'], h3: ['20px', '28px'], h2: ['24px', '32px'], h1: ['32px', '40px'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-0 sm:p-4 text-textPrimary">

    <div class="w-full max-w-[430px] h-screen sm:h-[880px] bg-background sm:rounded-modal shadow-2xl relative flex flex-col overflow-hidden border border-border p-6">

        <!-- Top: back button -->
        <div class="flex items-center gap-3">
            <button onclick="parent.switchScreen('login')" class="w-[44px] h-[44px] flex items-center justify-center bg-surface border border-border rounded-input text-textPrimary hover:bg-slate-50 transition-colors duration-150 shadow-soft flex-shrink-0">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Contact content -->
        <div class="flex-1 flex flex-col items-center justify-center text-center px-4 space-y-6">

            <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center">
                <i data-lucide="phone" class="w-8 h-8 text-primary"></i>
            </div>

            <div class="space-y-2">
                <h1 class="text-h2 font-semibold text-textPrimary">Liên hệ đăng ký</h1>
                <p class="text-body text-textSecondary max-w-xs">
                    Vui lòng liên hệ với quản trị viên qua số điện thoại hoặc email để được tạo tài khoản.
                </p>
            </div>

            <div class="w-full space-y-3">
                <a href="tel:09876662647" class="flex items-center gap-3 w-full p-4 bg-surface border border-border rounded-card shadow-soft hover:border-primary/30 transition-colors duration-150">
                    <div class="w-10 h-10 bg-green-50 rounded-full flex items-center justify-center flex-shrink-0">
                        <i data-lucide="phone-call" class="w-5 h-5 text-green-600"></i>
                    </div>
                    <div class="text-left">
                        <p class="text-small text-textSecondary">Số điện thoại</p>
                        <p class="text-body font-semibold text-textPrimary">0987 666 2647</p>
                    </div>
                </a>

                <a href="mailto:admin@mqhouse.vn" class="flex items-center gap-3 w-full p-4 bg-surface border border-border rounded-card shadow-soft hover:border-primary/30 transition-colors duration-150">
                    <div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center flex-shrink-0">
                        <i data-lucide="mail" class="w-5 h-5 text-blue-600"></i>
                    </div>
                    <div class="text-left">
                        <p class="text-small text-textSecondary">Email</p>
                        <p class="text-body font-semibold text-textPrimary">admin@mqhouse.vn</p>
                    </div>
                </a>
            </div>

            <button onclick="parent.switchScreen('login')" class="w-full py-3 bg-primary text-white font-semibold text-body rounded-button shadow-soft hover:bg-blue-700 transition-colors duration-150">
                Quay lại đăng nhập
            </button>

        </div>

    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
