<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thay đổi mật khẩu</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#2563EB',
                        background: '#F8FAFC',
                        surface: '#FFFFFF',
                        border: '#E2E8F0',
                        textPrimary: '#0F172A',
                        textSecondary: '#64748B',
                        success: '#16A34A',
                        warning: '#F59E0B',
                        error: '#DC2626',
                    },
                    boxShadow: {
                        soft: '0 4px 6px -1px rgba(15, 23, 42, 0.05), 0 2px 4px -2px rgba(15, 23, 42, 0.05)',
                    },
                    borderRadius: {
                        input: '10px',
                        button: '12px',
                        card: '16px',
                        modal: '20px',
                    }
                }
            }
        }
    </script>
    <style>
        /* Áp dụng font-size chuẩn theo yêu cầu */
        .text-h1 { font-size: 32px; font-weight: 600; }
        .text-h2 { font-size: 24px; font-weight: 600; }
        .text-h3 { font-size: 20px; font-weight: 500; }
        .text-body { font-size: 14px; font-weight: 400; }
        .text-small { font-size: 12px; font-weight: 400; }
        
        /* Custom mượt mà cho transition */
        .smooth-transition {
            transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-background text-textPrimary font-sans antialiased min-h-screen flex flex-col justify-between">

    <!-- Topbar Navigation -->
    <header class="bg-surface border-b border-border px-4 py-3 sticky top-0 z-10 flex items-center h-14">
        <button onclick="parent.switchScreen('profile')" class="w-8 h-8 flex items-center justify-center text-textSecondary hover:text-textPrimary bg-background rounded-full smooth-transition" aria-label="Quay lại">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </button>
        <h2 class="text-body font-semibold ml-3 flex-1 text-textPrimary">Thay đổi mật khẩu</h2>
    </header>

    <!-- Main Content Form -->
    <main class="flex-1 p-6 max-w-md w-full mx-auto">
        <div class="mb-6">
            <p class="text-body text-textSecondary">Để đảm bảo an toàn cho tài khoản của bạn, vui lòng không chia sẻ mật khẩu này với người khác.</p>
        </div>

        <form id="passwordForm" class="space-y-4" onsubmit="handleSubmit(event)">
            <!-- Mật khẩu cũ -->
            <div class="space-y-2">
                <label for="oldPassword" class="text-body font-medium text-textPrimary block">Mật khẩu cũ</label>
                <div class="relative">
                    <input type="password" id="oldPassword" required
                        class="w-full h-11 px-3.5 bg-surface border border-border rounded-input text-body text-textPrimary focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder-textSecondary smooth-transition"
                        placeholder="Nhập mật khẩu hiện tại">
                    <button type="button" onclick="togglePassword('oldPassword', this)" class="absolute right-3.5 top-3 text-textSecondary hover:text-textPrimary smooth-transition">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Mật khẩu mới -->
            <div class="space-y-2">
                <label for="newPassword" class="text-body font-medium text-textPrimary block">Mật khẩu mới</label>
                <div class="relative">
                    <input type="password" id="newPassword" required
                        class="w-full h-11 px-3.5 bg-surface border border-border rounded-input text-body text-textPrimary focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder-textSecondary smooth-transition"
                        placeholder="Tối thiểu 8 ký tự">
                    <button type="button" onclick="togglePassword('newPassword', this)" class="absolute right-3.5 top-3 text-textSecondary hover:text-textPrimary smooth-transition">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Xác nhận mật khẩu mới -->
            <div class="space-y-2">
                <label for="confirmPassword" class="text-body font-medium text-textPrimary block">Xác nhận mật khẩu mới</label>
                <div class="relative">
                    <input type="password" id="confirmPassword" required
                        class="w-full h-11 px-3.5 bg-surface border border-border rounded-input text-body text-textPrimary focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder-textSecondary smooth-transition"
                        placeholder="Nhập lại mật khẩu mới">
                    <button type="button" onclick="togglePassword('confirmPassword', this)" class="absolute right-3.5 top-3 text-textSecondary hover:text-textPrimary smooth-transition">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </form>
    </main>

    <!-- Bottom Action Button -->
    <div class="p-6 bg-surface border-t border-border sticky bottom-0 max-w-md w-full mx-auto">
        <button type="submit" form="passwordForm"
            class="w-full h-12 bg-primary text-surface font-medium text-body rounded-button shadow-soft hover:opacity-95 active:scale-[0.99] flex items-center justify-center gap-2 smooth-transition">
            <span>Xác nhận</span>
        </button>
    </div>

    <!-- Toast Notification (Thay đổi mật khẩu thành công) -->
    <div id="toast" class="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-surface border border-border px-4 py-3 rounded-card shadow-soft flex items-center gap-3 opacity-0 pointer-events-none translate-y-2 smooth-transition max-w-[90%] w-max">
        <div class="w-6 h-6 rounded-full bg-success/10 flex items-center justify-center text-success flex-shrink-0">
            <i data-lucide="check" class="w-4 h-4"></i>
        </div>
        <span class="text-body font-medium text-textPrimary">Thay đổi mật khẩu thành công</span>
    </div>

    <!-- Lucide Icons Packages -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script>
        // Khởi tạo các icon của Lucide
        lucide.createIcons();

        // Hàm ẩn/hiện mật khẩu
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        // Xử lý sự kiện Submit Form
        function handleSubmit(event) {
            event.preventDefault();
            
            const oldPass = document.getElementById('oldPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            // Kiểm tra khớp mật khẩu đơn giản
            if (newPass !== confirmPass) {
                alert("Mật khẩu mới và xác nhận mật khẩu không trùng khớp!");
                return;
            }

            // Gọi Toast Notification thành công
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-2');
            toast.classList.add('opacity-100', 'translate-y-0');

            // Reset form
            document.getElementById('passwordForm').reset();

            // Ẩn tự động thông báo sau 3 giây
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-2');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }
    </script>
</body>
</html>
