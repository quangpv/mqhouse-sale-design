<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS App Dashboard Navigator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#2563EB',
                        background: '#F8FAFC',
                        surface: '#FFFFFF',
                        border: '#E2E8F0',
                        textPrimary: '#0F172A',
                        textSecondary: '#64748B',
                        success: '#16A34A',
                        warning: '#F59E0B',
                        error: '#DC2626',
                    },
                    borderRadius: {
                        'input': '10px',
                        'button': '12px',
                        'card': '16px',
                        'modal': '20px',
                    },
                    boxShadow: {
                        'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        'phone': '0 25px 50px -12px rgba(15, 23, 42, 0.15)'
                    },
                    fontSize: {
                        'small': ['12px', '16px'],
                        'body': ['14px', '20px'],
                        'h3': ['20px', '28px'],
                        'h2': ['24px', '32px'],
                        'h1': ['32px', '40px'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #phone-screen-viewport iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="bg-[#0F172A] text-textPrimary h-screen flex overflow-hidden antialiased">

    <aside class="w-72 bg-surface border-r border-border flex flex-col justify-between z-20 shadow-sm">
        <div>
            <div class="p-6 border-b border-border flex items-center gap-3">
                <div class="w-10 h-10 bg-primary/10 rounded-button flex items-center justify-center text-primary">
                    <i data-lucide="monitor" class="w-5 h-5 stroke-[2.5]"></i>
                </div>
                <div>
                    <h2 class="text-body font-bold text-textPrimary">Màn hình</h2>
                    <p class="text-small text-textSecondary">Hệ thống quản lý</p>
                </div>
            </div>

            <div class="p-4 space-y-6">
                <div>
                    <span class="px-3 text-small font-bold text-textSecondary/70 uppercase tracking-wider block mb-2">Xác thực</span>
                    <div class="space-y-1">
                        <button onclick="switchScreen('login')" id="btn-login" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-button text-body font-medium text-textSecondary hover:text-textPrimary hover:bg-background transition-all duration-150">
                            <i data-lucide="log-in" class="w-4 h-4"></i> Đăng nhập
                        </button>
                        <button onclick="switchScreen('register')" id="btn-register" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-button text-body font-medium text-textSecondary hover:text-textPrimary hover:bg-background transition-all duration-150">
                            <i data-lucide="user-plus" class="w-4 h-4"></i> Đăng ký
                        </button>
                        <button onclick="switchScreen('forgotPassword')" id="btn-forgot-password" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-button text-body font-medium text-textSecondary hover:text-textPrimary hover:bg-background transition-all duration-150">
                            <i data-lucide="user-plus" class="w-4 h-4"></i> Quên mật khẩu
                        </button>
                        <button onclick="switchScreen('otp')" id="btn-forgot-password" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-button text-body font-medium text-textSecondary hover:text-textPrimary hover:bg-background transition-all duration-150">
                            <i data-lucide="user-plus" class="w-4 h-4"></i> Xác nhận OTP
                        </button>
                        <button onclick="switchScreen('resetPassword')" id="btn-forgot-password" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-button text-body font-medium text-textSecondary hover:text-textPrimary hover:bg-background transition-all duration-150">
                            <i data-lucide="user-plus" class="w-4 h-4"></i> Khởi tạo lại mật khẩu
                        </button>
                    </div>
                </div>

                <div>
                    <span class="px-3 text-small font-bold text-textSecondary/70 uppercase tracking-wider block mb-2">Khám phá</span>
                    <div class="space-y-1">
                        <button onclick="switchScreen('home')" id="btn-home" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-button text-body font-medium text-textSecondary hover:text-textPrimary hover:bg-background transition-all duration-150">
                            <i data-lucide="home" class="w-4 h-4"></i> Trang chủ
                        </button>
                        <button onclick="switchScreen('search')" id="btn-search" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-button text-body font-medium text-textSecondary hover:text-textPrimary hover:bg-background transition-all duration-150">
                            <i data-lucide="search" class="w-4 h-4"></i> Tìm kiếm
                        </button>
                        <button onclick="switchScreen('notifications')" id="btn-notifications" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-button text-body font-medium text-textSecondary hover:text-textPrimary hover:bg-background transition-all duration-150">
                            <i data-lucide="bell" class="w-4 h-4"></i> Thông báo
                        </button>
                        <button onclick="switchScreen('profile')" id="btn-profile" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-button text-body font-medium text-textSecondary hover:text-textPrimary hover:bg-background transition-all duration-150">
                            <i data-lucide="user" class="w-4 h-4"></i> Hồ sơ cá nhân
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="p-4 border-t border-border bg-background/50">
            <div class="flex items-center gap-2 text-small text-textSecondary">
                <span class="w-2 h-2 rounded-full bg-success"></span>
                <span>Live Preview Mode Active</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 bg-background relative flex items-center justify-center p-6 overflow-y-auto">
        <div class="absolute inset-0 pointer-events-none opacity-[0.03] bg-[linear-gradient(to_right,#808080_1px,transparent_1px),linear-gradient(to_bottom,#808080_1px,transparent_1px)] bg-[size:24px_24px]"></div>

        <div class="relative w-[390px] h-[800px] max-h-[calc(100vh-48px)] bg-surface rounded-[40px] shadow-phone border-[10px] border-textPrimary overflow-hidden flex flex-col justify-between transition-all duration-300">
            
            <div class="h-7 bg-surface w-full absolute top-0 left-0 right-0 z-50 px-6 flex justify-between items-center text-[12px] font-semibold text-textPrimary">
                <span>09:41</span>
                <div class="w-28 h-4 bg-textPrimary rounded-full absolute left-1/2 -translate-x-1/2 top-1.5"></div>
                <div class="flex items-center gap-1.5">
                    <i data-lucide="signal" class="w-3.5 h-3.5"></i>
                    <i data-lucide="wifi" class="w-3.5 h-3.5"></i>
                    <i data-lucide="battery" class="w-4 h-4"></i>
                </div>
            </div>

            <div id="phone-screen-viewport" class="flex-1 bg-background overflow-y-auto no-scrollbar pt-7">
                </div>

            <nav id="mobile-tab-bar" class="absolute bottom-0 left-0 right-0 bg-surface/90 backdrop-blur-md border-t border-border px-6 py-3.5 flex items-center justify-between z-40">
                <button onclick="switchScreen('home')" id="tab-home" class="mobile-tab-btn flex flex-col items-center gap-0.5 text-textSecondary transition-colors duration-150">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    <span class="text-small font-medium">Trang chủ</span>
                </button>
                <button onclick="switchScreen('search')" id="tab-search" class="mobile-tab-btn flex flex-col items-center gap-0.5 text-textSecondary transition-colors duration-150">
                    <i data-lucide="search" class="w-5 h-5"></i>
                    <span class="text-small font-medium">Tìm kiếm</span>
                </button>
                <button onclick="switchScreen('notifications')" id="tab-notifications" class="mobile-tab-btn flex flex-col items-center gap-0.5 text-textSecondary relative transition-colors duration-150">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute top-0 right-1.5 w-1.5 h-1.5 bg-error rounded-full"></span>
                    <span class="text-small font-medium">Thông báo</span>
                </button>
                <button onclick="switchScreen('profile')" id="tab-profile" class="mobile-tab-btn flex flex-col items-center gap-0.5 text-textSecondary transition-colors duration-150">
                    <i data-lucide="user" class="w-5 h-5"></i>
                    <span class="text-small font-medium">Hồ sơ</span>
                </button>
            </nav>
        </div>
    </main>

    <script>
        const externalPages = {
            login: 'login1.html',
            register: 'register1.html',
            home: 'dashboard.html',
            otp: 'otp.html',
            search: 'search.html',
            notifications: 'notifications.html',
            profile: 'profile.html',
            forgotPassword: 'forgot-password.html',
            resetPassword: 'reset-password.html',
        };

        function switchScreen(screenKey) {
            const viewport = document.getElementById('phone-screen-viewport');
            const file = externalPages[screenKey];
            const isTabScreen = ['home', 'search', 'notifications', 'profile'].includes(screenKey);
            const tabContainer = document.getElementById('mobile-tab-bar');

            fetch(file, { method: 'HEAD' })
                .then(res => {
                    if (res.ok) {
                        viewport.innerHTML = `<iframe src="${file}"></iframe>`;
                    } else {
                        showNotImplemented(viewport);
                    }
                })
                .catch(() => showNotImplemented(viewport));

            tabContainer.classList.toggle('hidden', !isTabScreen);
            viewport.classList.toggle('pb-16', isTabScreen);

            if (isTabScreen) {
                document.querySelectorAll('.mobile-tab-btn').forEach(btn => {
                    btn.classList.remove('text-primary');
                    btn.classList.add('text-textSecondary');
                });
                const activeTab = document.getElementById(`tab-${screenKey}`);
                if (activeTab) {
                    activeTab.classList.remove('text-textSecondary');
                    activeTab.classList.add('text-primary');
                }
            }

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-primary', 'text-white', 'hover:bg-background');
                btn.classList.add('text-textSecondary', 'hover:text-textPrimary', 'hover:bg-background');
            });
            const targetSideBtn = document.getElementById(`btn-${screenKey}`);
            if (targetSideBtn) {
                targetSideBtn.classList.remove('text-textSecondary', 'hover:text-textPrimary', 'hover:bg-background');
                targetSideBtn.classList.add('bg-primary', 'text-white');
            }
        }

        function showNotImplemented(viewport) {
            viewport.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-center p-8 space-y-3">
                    <i data-lucide="construction" class="w-12 h-12 text-textSecondary"></i>
                    <p class="text-body font-medium text-textSecondary">Trang chưa được triển khai</p>
                </div>`;
            lucide.createIcons();
        }

        // Initialize App Screen Pipeline Routing default state
        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            switchScreen('home');
        });
    </script>
</body>
</html>
