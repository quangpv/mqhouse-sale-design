<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bất Động Sản - Mobile UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#2563EB',
                        background: '#F8FAFC',
                        surface: '#FFFFFF',
                        border: '#E2E8F0',
                        textPrimary: '#0F172A',
                        textSecondary: '#64748B',
                        success: '#16A34A',
                        warning: '#F59E0B',
                        error: '#DC2626',
                    },
                    borderRadius: {
                        'input': '10px',
                        'button': '12px',
                        'card': '16px',
                        'modal': '20px',
                    },
                    boxShadow: {
                        'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                    },
                    fontSize: {
                        'small': ['12px', '16px'],
                        'body': ['14px', '20px'],
                        'h3': ['20px', '28px'],
                        'h2': ['24px', '32px'],
                        'h1': ['32px', '40px'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0F172A;
        }
        /* Hide scrollbars for clean presentation while keeping functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-0 sm:p-4">

    <div class="w-full max-w-[440px] h-[900px] bg-background text-textPrimary flex flex-col justify-between relative overflow-hidden sm:rounded-modal sm:shadow-2xl border border-border">
        
        <div class="p-4 bg-surface border-b border-border space-y-4 pt-6">
            <div class="flex items-center gap-3">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-textSecondary"></i>
                    <input type="text" placeholder="Tìm kiếm địa chỉ..." class="w-full pl-9 pr-4 py-2.5 bg-background border border-border rounded-input text-body placeholder:text-textSecondary focus:outline-none focus:border-primary transition-colors duration-150">
                </div>
                <button class="w-[42px] h-[42px] flex items-center justify-center bg-primary text-white rounded-button hover:bg-opacity-90 transition-all duration-150 active:scale-95 shadow-soft">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar pb-4">
            
            <div class="grid grid-cols-3 gap-3 p-4">
                <button class="flex flex-col items-center justify-center bg-surface border border-border p-4 rounded-card shadow-soft hover:border-primary transition-all duration-150 group">
                    <div class="w-12 h-12 bg-blue-50 text-primary rounded-full flex items-center justify-center mb-2 group-hover:scale-105 transition-transform duration-150">
                        <i data-lucide="building-2" class="w-6 h-6"></i>
                    </div>
                    <span class="text-small font-medium">Căn hộ</span>
                </button>
                <button class="flex flex-col items-center justify-center bg-surface border border-border p-4 rounded-card shadow-soft hover:border-primary transition-all duration-150 group">
                    <div class="w-12 h-12 bg-blue-50 text-primary rounded-full flex items-center justify-center mb-2 group-hover:scale-105 transition-transform duration-150">
                        <i data-lucide="building" class="w-6 h-6"></i>
                    </div>
                    <span class="text-small font-medium">Tòa nhà</span>
                </button>
                <button class="flex flex-col items-center justify-center bg-surface border border-border p-4 rounded-card shadow-soft hover:border-primary transition-all duration-150 group">
                    <div class="w-12 h-12 bg-blue-50 text-primary rounded-full flex items-center justify-center mb-2 group-hover:scale-105 transition-transform duration-150">
                        <i data-lucide="home" class="w-6 h-6"></i>
                    </div>
                    <span class="text-small font-medium">Phòng trọ</span>
                </button>
            </div>

            <div class="px-4 py-2 space-y-3">
                <div class="flex items-center justify-between">
                    <h3 class="text-body font-semibold text-textSecondary uppercase tracking-wider">Tìm kiếm nhanh</h3>
                    <button class="flex items-center gap-1.5 px-3 py-1.5 bg-surface border border-border rounded-button text-small font-medium hover:bg-background transition-colors duration-150">
                        <span>Chọn Tỉnh thành</span>
                        <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-textSecondary"></i>
                    </button>
                </div>
                
                <div class="flex items-center gap-2 overflow-x-auto no-scrollbar py-1">
                    <button class="px-4 py-2 bg-primary text-white text-body font-medium rounded-button shadow-soft whitespace-nowrap transition-colors duration-150">Quận 1</button>
                    <button class="px-4 py-2 bg-surface border border-border text-textPrimary text-body font-medium rounded-button shadow-soft hover:border-border whitespace-nowrap transition-colors duration-150">Quận 2</button>
                    <button class="px-4 py-2 bg-surface border border-border text-textPrimary text-body font-medium rounded-button shadow-soft hover:border-border whitespace-nowrap transition-colors duration-150">Quận 3</button>
                    <button class="px-4 py-2 bg-surface border border-border text-textPrimary text-body font-medium rounded-button shadow-soft hover:border-border whitespace-nowrap transition-colors duration-150">Quận 4</button>
                    <button class="px-4 py-2 bg-surface border border-border text-textPrimary text-body font-medium rounded-button shadow-soft hover:border-border whitespace-nowrap transition-colors duration-150">Quận 7</button>
                    <button class="px-4 py-2 bg-surface border border-border text-textPrimary text-body font-medium rounded-button shadow-soft hover:border-border whitespace-nowrap transition-colors duration-150">Bình Thạnh</button>
                </div>
            </div>

            <div class="py-4 space-y-3">
                <div class="px-4 flex items-center justify-between">
                    <h3 class="text-h3 font-semibold text-textPrimary">Nổi bật</h3>
                    <a href="#" class="text-body font-medium text-primary hover:underline">Xem tất cả</a>
                </div>
                
                <div id="featured-list" class="flex gap-4 overflow-x-auto no-scrollbar px-4 py-1">
                    </div>
            </div>

            <div class="py-4 space-y-3">
                <div class="px-4 flex items-center justify-between">
                    <h3 class="text-h3 font-semibold text-textPrimary">Mới nhất</h3>
                    <a href="#" class="text-body font-medium text-primary hover:underline">Xem tất cả</a>
                </div>
                
                <div id="latest-list" class="flex gap-4 overflow-x-auto no-scrollbar px-4 py-1">
                    </div>
            </div>

            <div class="px-4 py-4 space-y-3">
                <div class="flex items-center justify-between">
                    <h3 class="text-h3 font-semibold text-textPrimary">Xem gần đây</h3>
                </div>
                
                <div id="recent-list" class="space-y-3">
                    </div>
            </div>

    </div>

    <script>
        // High Quality Realistic Mock Data Match Domain requirements
        const mockProperties = [
            {
                id: 1,
                title: "Flora Novia Apartment",
                type: "Căn hộ",
                address: "128 Nguyễn Văn Bánh, Bình Thạnh",
                price: "18tr - 20tr",
                status: "Còn phòng",
                imageUrl: "https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=400&q=80",
                featured: true,
                latest: false
            },
            {
                id: 2,
                title: "Vinhomes Central Park",
                type: "Căn hộ",
                address: "208 Nguyễn Hữu Cảnh, Bình Thạnh",
                price: "25tr - 35tr",
                status: "Còn phòng",
                imageUrl: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=400&q=80",
                featured: true,
                latest: true
            },
            {
                id: 3,
                title: "Sunrise City View",
                type: "Căn hộ",
                address: "23 Nguyễn Hữu Thọ, Quận 7",
                price: "15tr - 22tr",
                status: "Hết phòng",
                imageUrl: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=400&q=80",
                featured: true,
                latest: false
            },
            {
                id: 4,
                title: "Leman Luxury Office Building",
                type: "Tòa nhà",
                address: "117 Nguyễn Đình Chiểu, Quận 3",
                price: "80tr - 150tr",
                status: "Còn phòng",
                imageUrl: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=400&q=80",
                featured: false,
                latest: true
            },
            {
                id: 5,
                title: "Studio House Đặng Văn Ngữ",
                type: "Phòng trọ",
                address: "45/12 Đặng Văn Ngữ, Phú Nhuận",
                price: "6tr - 8tr",
                status: "Còn phòng",
                imageUrl: "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=400&q=80",
                featured: false,
                latest: true
            }
        ];

        // Component builders
        function createHorizontalCard(item) {
            return `
                <div class="w-[240px] flex-shrink-0 bg-surface border border-border rounded-card overflow-hidden shadow-soft transition-all duration-150 hover:border-primary/50">
                    <div class="relative w-full h-32 bg-slate-100 overflow-hidden">
                        <img src="${item.imageUrl}" alt="${item.title}" class="w-full h-full object-cover">
                        <button class="absolute top-2 right-2 w-8 h-8 flex items-center justify-center bg-surface/80 backdrop-blur-sm text-textSecondary rounded-full hover:text-error transition-colors duration-150">
                            <i data-lucide="heart" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="p-3 space-y-1">
                        <span class="text-small font-semibold text-primary px-2 py-0.5 bg-blue-50 rounded-md inline-block">${item.type}</span>
                        <h4 class="text-body font-semibold text-textPrimary truncate">${item.title}</h4>
                        <p class="text-small text-textSecondary truncate flex items-center gap-1">
                            <i data-lucide="map-pin" class="w-3 h-3 flex-shrink-0"></i> ${item.address}
                        </p>
                        <div class="pt-1 flex items-center justify-between">
                            <span class="text-body font-bold text-textPrimary">${item.price}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function createVerticalRow(item) {
            return `
                <div class="w-full flex bg-surface border border-border rounded-card overflow-hidden shadow-soft p-3 gap-3 transition-all duration-150 hover:border-primary/50">
                    <div class="w-24 h-24 bg-slate-100 rounded-button overflow-hidden flex-shrink-0">
                        <img src="${item.imageUrl}" alt="${item.title}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 flex flex-col justify-between min-w-0">
                        <div class="space-y-0.5 relative">
                            <button class="absolute top-0 right-0 text-textSecondary hover:text-error transition-colors duration-150">
                                <i data-lucide="heart" class="w-4 h-4"></i>
                            </button>
                            <span class="text-[11px] font-semibold text-primary uppercase tracking-wider">${item.type}</span>
                            <h4 class="text-body font-semibold text-textPrimary truncate pr-5">${item.title}</h4>
                            <p class="text-small text-textSecondary truncate">${item.address}</p>
                        </div>
                        <div class="flex items-center justify-between pt-1">
                            <span class="text-body font-bold text-textPrimary">${item.price}</span>
                            <span class="text-small font-medium ${item.status === 'Còn phòng' ? 'text-success' : 'text-textSecondary'} flex items-center gap-1">
                                <span class="w-1.5 h-1.5 rounded-full ${item.status === 'Còn phòng' ? 'bg-success' : 'bg-textSecondary'}"></span>
                                ${item.status}
                            </span>
                        </div>
                    </div>
                </div>
            `;
        }

        // Render UI Pipeline
        document.addEventListener("DOMContentLoaded", () => {
            const featuredContainer = document.getElementById('featured-list');
            const latestContainer = document.getElementById('latest-list');
            const recentContainer = document.getElementById('recent-list');

            // Populate Sections
            mockProperties.forEach(item => {
                if (item.featured) {
                    featuredContainer.innerHTML += createHorizontalCard(item);
                }
                if (item.latest) {
                    latestContainer.innerHTML += createHorizontalCard(item);
                }
                // Populate all items into recent list view demonstration
                recentContainer.innerHTML += createVerticalRow(item);
            });

            // Initialize Lucide icons package properly for runtime injects
            lucide.createIcons();
        });
    </script>
</body>
</html>
