<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bất Động Sản - Mobile UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#2563EB',
                        background: '#F8FAFC',
                        surface: '#FFFFFF',
                        border: '#E2E8F0',
                        textPrimary: '#0F172A',
                        textSecondary: '#64748B',
                        success: '#16A34A',
                        warning: '#F59E0B',
                        error: '#DC2626',
                    },
                    borderRadius: {
                        'input': '10px',
                        'button': '12px',
                        'card': '16px',
                        'modal': '20px',
                    },
                    boxShadow: {
                        'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                    },
                    fontSize: {
                        'small': ['12px', '16px'],
                        'body': ['14px', '20px'],
                        'h3': ['20px', '28px'],
                        'h2': ['24px', '32px'],
                        'h1': ['32px', '40px'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0F172A;
        }
        /* Hide scrollbars for clean presentation while keeping functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .overscroll-contain { overscroll-behavior-y: contain; }
    </style>
</head>
<body class="flex justify-center items-center h-screen p-0 sm:p-4">

    <div class="w-full max-w-[440px] h-full bg-background text-textPrimary flex flex-col justify-between relative overflow-hidden sm:rounded-modal sm:shadow-2xl">
        
        <div class="p-4 bg-surface border-b border-border space-y-4 pt-4">
            <div class="flex items-center gap-3">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-textSecondary"></i>
                    <input type="text" id="search-input" placeholder="Tìm kiếm địa chỉ..." onkeydown="if(event.key==='Enter'){parent.switchScreen('search')}" class="w-full pl-9 pr-4 py-2.5 bg-background border border-border rounded-input text-body placeholder:text-textSecondary focus:outline-none focus:border-primary transition-colors duration-150">
                </div>
                <button onclick="parent.switchScreen('addProperty')" class="w-[42px] h-[42px] flex items-center justify-center bg-primary text-white rounded-button hover:bg-opacity-90 transition-all duration-150 active:scale-95 shadow-soft">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar overscroll-contain pb-4" style="overscroll-behavior-y:contain">
            
            <div class="grid grid-cols-3 gap-3 p-4">
                <button onclick="parent.switchScreen('search')" class="flex flex-col items-center justify-center bg-surface border border-border p-4 rounded-card shadow-soft hover:border-primary transition-all duration-150 group">
                    <div class="w-12 h-12 bg-blue-50 text-primary rounded-full flex items-center justify-center mb-2 group-hover:scale-105 transition-transform duration-150">
                        <i data-lucide="building-2" class="w-6 h-6"></i>
                    </div>
                    <span class="text-small font-medium">Căn hộ</span>
                </button>
                <button onclick="parent.switchScreen('search')" class="flex flex-col items-center justify-center bg-surface border border-border p-4 rounded-card shadow-soft hover:border-primary transition-all duration-150 group">
                    <div class="w-12 h-12 bg-blue-50 text-primary rounded-full flex items-center justify-center mb-2 group-hover:scale-105 transition-transform duration-150">
                        <i data-lucide="building" class="w-6 h-6"></i>
                    </div>
                    <span class="text-small font-medium">Tòa nhà</span>
                </button>
                <button onclick="parent.switchScreen('search')" class="flex flex-col items-center justify-center bg-surface border border-border p-4 rounded-card shadow-soft hover:border-primary transition-all duration-150 group">
                    <div class="w-12 h-12 bg-blue-50 text-primary rounded-full flex items-center justify-center mb-2 group-hover:scale-105 transition-transform duration-150">
                        <i data-lucide="home" class="w-6 h-6"></i>
                    </div>
                    <span class="text-small font-medium">Phòng trọ</span>
                </button>
            </div>

            <div class="mx-4 rounded-card overflow-hidden relative h-[148px]">
                <div id="banner-slide-0" onclick="parent.switchScreen('search')" class="absolute inset-0 transition-all duration-500 ease-in-out cursor-pointer bg-gradient-to-r from-primary to-blue-500" style="transform: translateX(0); z-index: 20;">
                    <div class="absolute inset-0 bg-cover bg-center opacity-20" style="background-image: url('https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=800&q=80')"></div>
                    <div class="relative p-4 flex items-center justify-between">
                        <div class="space-y-1">
                            <p class="text-small font-medium text-white/80">Quảng cáo</p>
                            <h4 class="text-body font-semibold text-white">Dịch vụ đăng tin BĐS chuyên nghiệp</h4>
                            <span class="inline-block mt-1 px-3 py-1 bg-white/20 rounded-button text-small font-medium text-white">Tìm hiểu thêm</span>
                        </div>
                        <div class="w-14 h-14 bg-white/15 rounded-full flex items-center justify-center flex-shrink-0">
                            <i data-lucide="megaphone" class="w-7 h-7 text-white"></i>
                        </div>
                    </div>
                </div>
                <div id="banner-slide-1" onclick="parent.switchScreen('search')" class="absolute inset-0 transition-all duration-500 ease-in-out cursor-pointer bg-gradient-to-r from-violet-600 to-indigo-500" style="transform: translateX(100%); z-index: 10;">
                    <div class="absolute inset-0 bg-cover bg-center opacity-20" style="background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=800&q=80')"></div>
                    <div class="relative p-4 flex items-center justify-between">
                        <div class="space-y-1">
                            <p class="text-small font-medium text-white/80">Quảng cáo</p>
                            <h4 class="text-body font-semibold text-white">Cho thuê văn phòng & mặt bằng</h4>
                            <span class="inline-block mt-1 px-3 py-1 bg-white/20 rounded-button text-small font-medium text-white">Khám phá ngay</span>
                        </div>
                        <div class="w-14 h-14 bg-white/15 rounded-full flex items-center justify-center flex-shrink-0">
                            <i data-lucide="building-2" class="w-7 h-7 text-white"></i>
                        </div>
                    </div>
                </div>
                <div id="banner-slide-2" onclick="parent.switchScreen('search')" class="absolute inset-0 transition-all duration-500 ease-in-out cursor-pointer bg-gradient-to-r from-emerald-600 to-teal-500" style="transform: translateX(100%); z-index: 10;">
                    <div class="absolute inset-0 bg-cover bg-center opacity-20" style="background-image: url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=800&q=80')"></div>
                    <div class="relative p-4 flex items-center justify-between">
                        <div class="space-y-1">
                            <p class="text-small font-medium text-white/80">Quảng cáo</p>
                            <h4 class="text-body font-semibold text-white">Nhà đất giá tốt mỗi ngày</h4>
                            <span class="inline-block mt-1 px-3 py-1 bg-white/20 rounded-button text-small font-medium text-white">Xem chi tiết</span>
                        </div>
                        <div class="w-14 h-14 bg-white/15 rounded-full flex items-center justify-center flex-shrink-0">
                            <i data-lucide="home" class="w-7 h-7 text-white"></i>
                        </div>
                    </div>
                </div>
                <div class="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-1.5 z-30">
                    <button id="banner-dot-0" onclick="goToBannerSlide(0)" class="w-2 h-2 rounded-full bg-white transition-all duration-300"></button>
                    <button id="banner-dot-1" onclick="goToBannerSlide(1)" class="w-1.5 h-1.5 rounded-full bg-white/60 transition-all duration-300"></button>
                    <button id="banner-dot-2" onclick="goToBannerSlide(2)" class="w-1.5 h-1.5 rounded-full bg-white/60 transition-all duration-300"></button>
                </div>
            </div>

            <div class="px-4 py-2 space-y-3 mt-2">
                <div class="flex items-center justify-between">
                    <h3 class="text-body font-semibold text-textSecondary uppercase tracking-wider">Tìm kiếm nhanh</h3>
                    <button onclick="toggleProvincePopup()" class="flex items-center gap-1.5 px-3 py-1.5 bg-surface border border-border rounded-button text-small font-medium hover:bg-background transition-colors duration-150">
                        <span id="selected-province">Chọn Tỉnh thành</span>
                        <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-textSecondary"></i>
                    </button>
                </div>
            </div>
            <div id="district-list" class="flex items-center gap-2 overflow-x-auto no-scrollbar py-1">
            </div>

            <div id="province-popup" class="fixed inset-0 z-50 hidden">
                <div class="absolute inset-0 bg-black/40" onclick="toggleProvincePopup()"></div>
                <div class="absolute bottom-0 left-0 right-0 bg-surface rounded-t-2xl max-h-[60vh] flex flex-col">
                    <div class="flex items-center justify-between p-4 border-b border-border">
                        <h3 class="text-body font-semibold">Chọn Tỉnh / Thành</h3>
                        <button onclick="toggleProvincePopup()" class="w-8 h-8 flex items-center justify-center text-textSecondary hover:text-textPrimary rounded-full hover:bg-background transition-colors">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div class="overflow-y-auto p-2" id="province-list"></div>
                </div>
            </div>

            <div class="py-4 space-y-3">
                <div class="px-4 flex items-center justify-between">
                    <h3 class="text-h3 font-semibold text-textPrimary">Nổi bật</h3>
                    <a href="#" onclick="parent.switchScreen('search');return false" class="text-body font-medium text-primary hover:underline">Xem tất cả</a>
                </div>
                
                <div id="featured-list" class="flex gap-4 overflow-x-auto no-scrollbar px-4 py-1">
                    </div>
            </div>

            <div class="py-4 space-y-3">
                <div class="px-4 flex items-center justify-between">
                    <h3 class="text-h3 font-semibold text-textPrimary">Mới nhất</h3>
                    <a href="#" onclick="parent.switchScreen('search');return false" class="text-body font-medium text-primary hover:underline">Xem tất cả</a>
                </div>
                
                <div id="latest-list" class="flex gap-4 overflow-x-auto no-scrollbar px-4 py-1">
                    </div>
            </div>

            <div class="px-4 py-4 space-y-3">
                <div class="flex items-center justify-between">
                    <h3 class="text-h3 font-semibold text-textPrimary">Xem gần đây</h3>
                </div>
                
                <div id="recent-list" class="space-y-3">
                    </div>
            </div>

    </div>

    <script>
        // High Quality Realistic Mock Data Match Domain requirements
        const mockProperties = [
            {
                id: 1,
                title: "Flora Novia Apartment",
                type: "Căn hộ",
                address: "128 Nguyễn Văn Bánh, Bình Thạnh",
                price: "18tr - 20tr",
                status: "Còn phòng",
                imageUrl: "https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=400&q=80",
                featured: true,
                latest: false
            },
            {
                id: 2,
                title: "Vinhomes Central Park",
                type: "Căn hộ",
                address: "208 Nguyễn Hữu Cảnh, Bình Thạnh",
                price: "25tr - 35tr",
                status: "Còn phòng",
                imageUrl: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=400&q=80",
                featured: true,
                latest: true
            },
            {
                id: 3,
                title: "Sunrise City View",
                type: "Căn hộ",
                address: "23 Nguyễn Hữu Thọ, Quận 7",
                price: "15tr - 22tr",
                status: "Hết phòng",
                imageUrl: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=400&q=80",
                featured: true,
                latest: false
            },
            {
                id: 4,
                title: "Leman Luxury Office Building",
                type: "Tòa nhà",
                address: "117 Nguyễn Đình Chiểu, Quận 3",
                price: "80tr - 150tr",
                status: "Còn phòng",
                imageUrl: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=400&q=80",
                featured: false,
                latest: true
            },
            {
                id: 5,
                title: "Studio House Đặng Văn Ngữ",
                type: "Phòng trọ",
                address: "45/12 Đặng Văn Ngữ, Phú Nhuận",
                price: "6tr - 8tr",
                status: "Còn phòng",
                imageUrl: "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=400&q=80",
                featured: false,
                latest: true
            }
        ];

        // Component builders
        function createHorizontalCard(item) {
            return `
                <div onclick="parent.switchScreen('propertyDetails')" class="w-[240px] flex-shrink-0 bg-surface border border-border rounded-card overflow-hidden shadow-soft transition-all duration-150 hover:border-primary/50 cursor-pointer">
                    <div class="relative w-full h-32 bg-slate-100 overflow-hidden">
                        <img src="${item.imageUrl}" alt="${item.title}" class="w-full h-full object-cover">
                        <button class="absolute top-2 right-2 w-8 h-8 flex items-center justify-center bg-surface/80 backdrop-blur-sm text-textSecondary rounded-full hover:text-error transition-colors duration-150">
                            <i data-lucide="heart" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="p-3 space-y-1">
                        <span class="text-small font-semibold text-primary px-2 py-0.5 bg-blue-50 rounded-md inline-block">${item.type}</span>
                        <h4 class="text-body font-semibold text-textPrimary truncate">${item.title}</h4>
                        <p class="text-small text-textSecondary truncate flex items-center gap-1">
                            <i data-lucide="map-pin" class="w-3 h-3 flex-shrink-0"></i> ${item.address}
                        </p>
                        <div class="pt-1 flex items-center justify-between">
                            <span class="text-body font-bold text-textPrimary">${item.price}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function createVerticalRow(item) {
            return `
                <div onclick="parent.switchScreen('propertyDetails')" class="w-full flex bg-surface border border-border rounded-card overflow-hidden shadow-soft p-3 gap-3 transition-all duration-150 hover:border-primary/50 cursor-pointer">
                    <div class="w-24 h-24 bg-slate-100 rounded-button overflow-hidden flex-shrink-0">
                        <img src="${item.imageUrl}" alt="${item.title}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 flex flex-col justify-between min-w-0">
                        <div class="space-y-0.5 relative">
                            <button class="absolute top-0 right-0 text-textSecondary hover:text-error transition-colors duration-150">
                                <i data-lucide="heart" class="w-4 h-4"></i>
                            </button>
                            <span class="text-[11px] font-semibold text-primary uppercase tracking-wider">${item.type}</span>
                            <h4 class="text-body font-semibold text-textPrimary truncate pr-5">${item.title}</h4>
                            <p class="text-small text-textSecondary truncate">${item.address}</p>
                        </div>
                        <div class="flex items-center justify-between pt-1">
                            <span class="text-body font-bold text-textPrimary">${item.price}</span>
                            <span class="text-small font-medium ${item.status === 'Còn phòng' ? 'text-success' : 'text-textSecondary'} flex items-center gap-1">
                                <span class="w-1.5 h-1.5 rounded-full ${item.status === 'Còn phòng' ? 'bg-success' : 'bg-textSecondary'}"></span>
                                ${item.status}
                            </span>
                        </div>
                    </div>
                </div>
            `;
        }

        const provinces = [
            'Hồ Chí Minh', 'Hà Nội', 'Đà Nẵng', 'Hải Phòng', 'Cần Thơ',
            'An Giang', 'Bà Rịa - Vũng Tàu', 'Bắc Giang', 'Bắc Kạn', 'Bạc Liêu',
            'Bắc Ninh', 'Bến Tre', 'Bình Dương', 'Bình Định', 'Bình Phước',
            'Bình Thuận', 'Cà Mau', 'Cao Bằng', 'Đắk Lắk', 'Đắk Nông',
            'Điện Biên', 'Đồng Nai', 'Đồng Tháp', 'Gia Lai', 'Hà Giang',
            'Hà Nam', 'Hà Tĩnh', 'Hải Dương', 'Hậu Giang', 'Hòa Bình',
            'Hưng Yên', 'Khánh Hòa', 'Kiên Giang', 'Kon Tum', 'Lai Châu',
            'Lâm Đồng', 'Lạng Sơn', 'Lào Cai', 'Long An', 'Nam Định',
            'Nghệ An', 'Ninh Bình', 'Ninh Thuận', 'Phú Thọ', 'Phú Yên',
            'Quảng Bình', 'Quảng Nam', 'Quảng Ngãi', 'Quảng Ninh', 'Quảng Trị',
            'Sóc Trăng', 'Sơn La', 'Tây Ninh', 'Thái Bình', 'Thái Nguyên',
            'Thanh Hóa', 'Thừa Thiên Huế', 'Tiền Giang', 'Trà Vinh', 'Tuyên Quang',
            'Vĩnh Long', 'Vĩnh Phúc', 'Yên Bái'
        ];

        function toggleProvincePopup() {
            document.getElementById('province-popup').classList.toggle('hidden');
            lucide.createIcons();
        }

        function selectProvince(name) {
            document.getElementById('selected-province').textContent = name;
            toggleProvincePopup();
        }

        // Render UI Pipeline
        document.addEventListener("DOMContentLoaded", () => {
            const districts = ['Quận 1', 'Quận 2', 'Quận 3', 'Quận 4', 'Quận 7', 'Bình Thạnh'];
            const districtContainer = document.getElementById('district-list');
            let selectedDistrict = null;
            districts.forEach((name, i) => {
                const btn = document.createElement('button');
                btn.textContent = name;
                btn.className = i === 0
                    ? 'px-4 py-2 bg-primary text-white text-body font-medium rounded-button shadow-soft whitespace-nowrap transition-colors duration-150'
                    : 'px-4 py-2 bg-surface border border-border text-textPrimary text-body font-medium rounded-button shadow-soft hover:border-border whitespace-nowrap transition-colors duration-150';
                if (i === 0) btn.style.marginLeft = '16px';
                if (i === districts.length - 1) btn.style.marginRight = '16px';
                if (i === 0) selectedDistrict = btn;
                btn.onclick = () => {
                    if (selectedDistrict) {
                        selectedDistrict.className = 'px-4 py-2 bg-surface border border-border text-textPrimary text-body font-medium rounded-button shadow-soft hover:border-border whitespace-nowrap transition-colors duration-150';
                        selectedDistrict.style.marginLeft = selectedDistrict.style.marginLeft || '';
                        selectedDistrict.style.marginRight = selectedDistrict.style.marginRight || '';
                    }
                    btn.className = 'px-4 py-2 bg-primary text-white text-body font-medium rounded-button shadow-soft whitespace-nowrap transition-colors duration-150';
                    if (i === 0) btn.style.marginLeft = '16px';
                    if (i === districts.length - 1) btn.style.marginRight = '16px';
                    selectedDistrict = btn;
                };
                districtContainer.appendChild(btn);
            });

            const provinceList = document.getElementById('province-list');
            provinces.forEach(name => {
                const div = document.createElement('div');
                div.textContent = name;
                div.className = 'px-4 py-3 text-body text-textPrimary rounded-button hover:bg-background cursor-pointer transition-colors duration-150';
                div.onclick = () => selectProvince(name);
                provinceList.appendChild(div);
            });

            const featuredContainer = document.getElementById('featured-list');
            const latestContainer = document.getElementById('latest-list');
            const recentContainer = document.getElementById('recent-list');

            // Populate Sections
            mockProperties.forEach(item => {
                if (item.featured) {
                    featuredContainer.innerHTML += createHorizontalCard(item);
                }
                if (item.latest) {
                    latestContainer.innerHTML += createHorizontalCard(item);
                }
                // Populate all items into recent list view demonstration
                recentContainer.innerHTML += createVerticalRow(item);
            });

            // Initialize Lucide icons package properly for runtime injects
            lucide.createIcons();

            // Start banner auto-slide
            bannerInterval = setInterval(() => goToBannerSlide((currentBannerSlide + 1) % totalBannerSlides), 4000);
        });

        // Banner slider — global for inline onclick
        let currentBannerSlide = 0;
        const totalBannerSlides = 3;
        let bannerInterval;

        function goToBannerSlide(index) {
            const prev = currentBannerSlide;
            if (prev === index) return;
            currentBannerSlide = index;

            const prevEl = document.getElementById(`banner-slide-${prev}`);
            prevEl.style.transform = 'translateX(-100%)';
            prevEl.style.zIndex = '10';

            const nextEl = document.getElementById(`banner-slide-${index}`);
            nextEl.style.transition = 'none';
            nextEl.style.transform = 'translateX(100%)';
            nextEl.style.zIndex = '20';
            nextEl.offsetHeight;
            nextEl.style.transition = '';
            nextEl.style.transform = 'translateX(0)';

            document.querySelectorAll('[id^="banner-dot-"]').forEach((dot, i) => {
                dot.className = i === index
                    ? 'w-2 h-2 rounded-full bg-white transition-all duration-300'
                    : 'w-1.5 h-1.5 rounded-full bg-white/60 transition-all duration-300';
            });

            clearInterval(bannerInterval);
            bannerInterval = setInterval(() => goToBannerSlide((currentBannerSlide + 1) % totalBannerSlides), 4000);
        }
    </script>
</body>
</html>
