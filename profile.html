<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Cá Nhân - Tìm Kiếm Bất Động Sản</title>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#2563EB',
                        background: '#F8FAFC',
                        surface: '#FFFFFF',
                        border: '#E2E8F0',
                        textPrimary: '#0F172A',
                        textSecondary: '#64748B',
                        success: '#16A34A',
                        warning: '#F59E0B',
                        error: '#DC2626',
                    },
                    borderRadius: {
                        'input': '10px',
                        'button': '12px',
                        'card': '16px',
                        'modal': '20px',
                    },
                    boxShadow: {
                        'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                    },
                    fontSize: {
                        'small': ['12px', '16px'],
                        'body': ['14px', '20px'],
                        'h3': ['20px', '28px'],
                        'h2': ['24px', '32px'],
                        'h1': ['32px', '40px'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Hide scrollbars */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-0 sm:p-4 text-textPrimary">

    <!-- Mobile Device Container -->
    <div class="w-full max-w-[430px] h-screen sm:h-[880px] bg-background sm:rounded-modal shadow-2xl relative flex flex-col overflow-hidden border border-border overflow-y-auto no-scrollbar">


        <!-- User Profile Summary Card -->
        <div class="p-6 bg-surface border-b border-border flex flex-col items-center text-center space-y-3">
            <div class="relative group">
                <div class="w-24 h-24 rounded-full overflow-hidden border-2 border-primary/20 shadow-soft bg-slate-100">
                    <img src="https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=400&q=80" alt="Avatar" class="w-full h-full object-cover">
                </div>
                <button class="absolute bottom-0 right-0 w-8 h-8 bg-primary text-white rounded-full flex items-center justify-center border-2 border-surface shadow-soft hover:bg-blue-700 transition-colors duration-150">
                    <i data-lucide="camera" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="space-y-0.5">
                <h1 class="text-h3 font-semibold text-textPrimary">Nguyễn Minh Thư</h1>
                <p class="text-small text-textSecondary font-medium">Sale</p>
            </div>
        </div>

        <!-- Navigation Links Wrapper -->
        <div class="p-4 space-y-3">

            <!-- Account Actions Group -->
            <div class="bg-surface rounded-card border border-border overflow-hidden shadow-soft">
                <!-- Profile Item -->
                <button class="w-full px-4 py-3.5 flex items-center justify-between hover:bg-slate-50 border-b border-border last:border-b-0 transition-colors duration-150 text-left group">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-input bg-blue-50 text-primary flex items-center justify-center">
                            <i data-lucide="user" class="w-4 h-4"></i>
                        </div>
                        <span class="text-body font-medium text-textPrimary">Thông tin cá nhân</span>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-textSecondary group-hover:translate-x-0.5 transition-transform duration-150"></i>
                </button>

                <!-- Change Password Item -->
                <button onclick="parent.switchScreen('changePassword')" class="w-full px-4 py-3.5 flex items-center justify-between hover:bg-slate-50 border-b border-border last:border-b-0 transition-colors duration-150 text-left group">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-input bg-blue-50 text-primary flex items-center justify-center">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                        </div>
                        <span class="text-body font-medium text-textPrimary">Đổi mật khẩu</span>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-textSecondary group-hover:translate-x-0.5 transition-transform duration-150"></i>
                </button>

                <!-- My Real Estate Item -->
                <button onclick="parent.switchScreen('myProperties')" class="w-full px-4 py-3.5 flex items-center justify-between hover:bg-slate-50 border-b border-border last:border-b-0 transition-colors duration-150 text-left group">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-input bg-blue-50 text-primary flex items-center justify-center">
                            <i data-lucide="building-2" class="w-4 h-4"></i>
                        </div>
                        <span class="text-body font-medium text-textPrimary">Bất động sản của tôi</span>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-textSecondary group-hover:translate-x-0.5 transition-transform duration-150"></i>
                </button>
            </div>

            <!-- Info and Support Group -->
            <div class="bg-surface rounded-card border border-border overflow-hidden shadow-soft">
                <!-- About Us Item -->
                <button class="w-full px-4 py-3.5 flex items-center justify-between hover:bg-slate-50 border-b border-border last:border-b-0 transition-colors duration-150 text-left group">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-input bg-slate-50 text-textSecondary flex items-center justify-center">
                            <i data-lucide="info" class="w-4 h-4"></i>
                        </div>
                        <span class="text-body font-medium text-textPrimary">Về chúng tôi</span>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-textSecondary group-hover:translate-x-0.5 transition-transform duration-150"></i>
                </button>

                <!-- Contact Support Item -->
                <button class="w-full px-4 py-3.5 flex items-center justify-between hover:bg-slate-50 border-b border-border last:border-b-0 transition-colors duration-150 text-left group">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-input bg-slate-50 text-textSecondary flex items-center justify-center">
                            <i data-lucide="help-circle" class="w-4 h-4"></i>
                        </div>
                        <span class="text-body font-medium text-textPrimary">Liên hệ và hỗ trợ</span>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-textSecondary group-hover:translate-x-0.5 transition-transform duration-150"></i>
                </button>

                <!-- Terms Policies Item -->
                <button class="w-full px-4 py-3.5 flex items-center justify-between hover:bg-slate-50 border-b border-border last:border-b-0 transition-colors duration-150 text-left group">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-input bg-slate-50 text-textSecondary flex items-center justify-center">
                            <i data-lucide="shield-check" class="w-4 h-4"></i>
                        </div>
                        <span class="text-body font-medium text-textPrimary">Điều khoản và chính sách</span>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-textSecondary group-hover:translate-x-0.5 transition-transform duration-150"></i>
                </button>
            </div>

            <!-- Sign Out Action -->
            <div class="pt-2">
                <button onclick="parent.switchScreen('login')" class="w-full px-4 py-3.5 bg-surface text-error border border-border font-semibold text-body rounded-button shadow-soft hover:bg-red-50/50 transition-colors duration-150 flex items-center justify-center gap-2">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span>Đăng xuất tài khoản</span>
                </button>
            </div>

        </div>

    </div>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
