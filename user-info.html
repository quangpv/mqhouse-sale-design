<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thông tin cá nhân</title>
  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F8FAFC;
      color: #0F172A;
    }
    /* Typography Overrides based on spec */
    .text-h1 { font-size: 32px; font-weight: 600; line-height: 40px; }
    .text-h2 { font-size: 24px; font-weight: 600; line-height: 32px; }
    .text-h3 { font-size: 20px; font-weight: 500; line-height: 28px; }
    .text-body { font-size: 14px; font-weight: 400; line-height: 20px; }
    .text-small { font-size: 12px; font-weight: 400; line-height: 16px; }
    
    /* Border Radiuses based on spec */
    .rounded-card { border-radius: 16px; }
    .rounded-button { border-radius: 12px; }
    .rounded-input { border-radius: 10px; }
    .rounded-modal { border-radius: 20px; }
    
    /* Custom Transitions */
    .smooth-transition {
      transition: all 150ms ease-in-out;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563EB',
            background: '#F8FAFC',
            surface: '#FFFFFF',
            border: '#E2E8F0',
            textPrimary: '#0F172A',
            textSecondary: '#64748B',
            success: '#16A34A',
            warning: '#F59E0B',
            error: '#DC2626',
          },
          boxShadow: {
            soft: '0 2px 8px -1px rgba(15, 23, 42, 0.05), 0 1px 3px -1px rgba(15, 23, 42, 0.03)',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-background min-h-screen flex flex-col antialiased pb-32">

  <!-- Notification Toast (Hidden by default) -->
  <div id="notification" class="fixed top-4 left-4 right-4 z-50 transform -translate-y-10 opacity-0 pointer-events-none smooth-transition">
    <div class="bg-surface border border-border rounded-card p-4 flex items-center gap-3">
      <div class="w-8 h-8 rounded-full bg-green-50 flex items-center justify-center text-success flex-shrink-0">
        <i data-lucide="check-circle-2" class="w-5 h-5"></i>
      </div>
      <div class="flex-1">
        <p class="text-body font-medium text-textPrimary">Cập nhật thành công</p>
        <p class="text-small text-textSecondary">Thông tin cá nhân của bạn đã được thay đổi.</p>
      </div>
    </div>
  </div>

  <!-- Header / Navigation Bar -->
  <header class="bg-surface border-b border-border sticky top-0 z-40 px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <button onclick="parent.switchScreen('profile')" class="text-textPrimary hover:text-textSecondary smooth-transition">
        <i data-lucide="chevron-left" class="w-6 h-6"></i>
      </button>
      <h2 class="text-h3 text-textPrimary">Thông tin cá nhân</h2>
    </div>
  </header>

  <!-- Main Content Container -->
  <main class="flex-1 px-4 py-6 max-w-md mx-auto w-full space-y-6" style="background-color:white;">
    
    <!-- Profile Section -->
    <div class="flex flex-col items-center text-center space-y-4 pt-2">
      <div class="relative">
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=256&auto=format&fit=crop" 
             alt="User Avatar" 
             class="w-24 h-24 rounded-full object-cover border-2 border-border p-0.5">
        <button class="absolute bottom-0 right-0 w-8 h-8 bg-primary text-white rounded-full flex items-center justify-center shadow-md hover:bg-blue-700 smooth-transition">
          <i data-lucide="camera" class="w-4 h-4"></i>
        </button>
      </div>
      
      <div class="space-y-1">
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-small font-medium bg-blue-50 text-primary">
          Quản trị viên
        </span>
        <h1 class="text-h2 text-textPrimary mt-2">Nguyễn Minh Thư</h1>
        <p class="text-small text-textSecondary flex items-center justify-center gap-1">
          <i data-lucide="hash" class="w-3.5 h-3.5"></i> ACC-2026-89A
        </p>
      </div>
    </div>

    <!-- Phone Input -->
    <div class="space-y-1.5">
      <label for="phone" class="text-body font-medium text-textPrimary flex items-center gap-2">
        <i data-lucide="phone" class="w-4 h-4 text-textSecondary"></i> Số điện thoại
      </label>
      <input type="tel" id="phone" value="0912345678" 
             class="w-full px-3.5 py-2.5 text-body bg-background border border-border rounded-input text-textPrimary focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary smooth-transition"
             placeholder="Nhập số điện thoại">
    </div>

    <!-- Operating Area Section -->
    <div class="space-y-4">
      <h3 class="text-body font-medium text-textPrimary flex items-center gap-2">
        <i data-lucide="map" class="w-4 h-4 text-textSecondary"></i> Khu vực hoạt động
      </h3>
      
      <div class="flex items-center gap-2.5">
        <i data-lucide="map-pin" class="w-4 h-4 text-primary"></i>
        <span class="text-small text-textPrimary font-medium">Quận 1, Thành phố Hồ Chí Minh</span>
      </div>

      <div class="space-y-2.5">
        <p class="text-small font-medium text-textSecondary tracking-wide">Phường/Xã</p>
        <div id="sub-districts-container" class="flex flex-wrap gap-2">
          <!-- Dynamic Chips Loaded via Mock Data -->
        </div>
      </div>
    </div>

  </main>

  <!-- Fixed Bottom Sticky Section -->
  <div class="fixed bottom-0 left-0 right-0 bg-surface border-t border-border p-4 z-40 shadow-[0_-4px_12px_rgba(15,23,42,0.03)]">
    <div class="max-w-md mx-auto">
      <button onclick="triggerUpdate()" class="w-full bg-primary hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-button text-body flex items-center justify-center gap-2 smooth-transition">
        <i data-lucide="save" class="w-4 h-4"></i>
        Cập nhật thông tin
      </button>
    </div>
  </div>

  <script>
    // Mock Data Architecture
    const mockRegions = [
      { id: "w1", name: "Phường Bến Nghé" },
      { id: "w2", name: "Phường Bến Thành" },
      { id: "w3", name: "Phường Nguyễn Cư Trinh" },
      { id: "w4", name: "Phường Đa Kao" },
      { id: "w5", name: "Phường Tân Định" }
    ];

    // Render Sub-district Chips
    function renderChips() {
      const container = document.getElementById('sub-districts-container');
      container.innerHTML = mockRegions.map(region => `
        <div class="inline-flex items-center gap-1.5 bg-background border border-border pl-2.5 pr-3 py-1 rounded-full text-small text-textPrimary hover:border-textSecondary smooth-transition cursor-default">
          <i data-lucide="layers" class="w-2 h-2 text-textSecondary"></i>
          <span class="text-small font-medium">${region.name}</span>
        </div>
      `).join('');
    }

    // Interactive Trigger Function
    function triggerUpdate() {
      const toast = document.getElementById('notification');
      
      // Fire action layout styling
      toast.classList.remove('opacity-0', '-translate-y-10', 'pointer-events-none');
      toast.classList.add('opacity-100', 'translate-y-0');
      
      // Automatic teardown timing (3s)
      setTimeout(() => {
        toast.classList.remove('opacity-100', 'translate-y-0');
        toast.classList.add('opacity-0', '-translate-y-10', 'pointer-events-none');
      }, 3000);
    }

    // DOM Bootstrapper
    document.addEventListener("DOMContentLoaded", () => {
      renderChips();
      lucide.createIcons(); // Hydrate Lucide Icons elements
    });
  </script>
</body>
</html>
