<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#2563EB',
                        background: '#F8FAFC',
                        surface: '#FFFFFF',
                        border: '#E2E8F0',
                        textPrimary: '#0F172A',
                        textSecondary: '#64748B',
                        success: '#16A34A',
                        warning: '#F59E0B',
                        error: '#DC2626',
                    },
                    borderRadius: {
                        input: '10px',
                        button: '12px',
                        card: '16px',
                        modal: '20px',
                    },
                    boxShadow: {
                        soft: '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                    },
                    fontSize: {
                        small: ['12px', '16px'],
                        body: ['14px', '20px'],
                        h3: ['20px', '28px'],
                        h2: ['24px', '32px'],
                        h1: ['32px', '40px'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-background text-textPrimary min-h-screen">
    <div class="p-4 space-y-4">
        <div class="flex justify-between items-center"><h3 class="text-body font-bold">Thông báo mới</h3><span class="text-small text-primary font-medium">Đánh dấu đã đọc</span></div>
        <div class="space-y-2.5">
            <div class="p-3 bg-blue-50/50 border border-blue-100 rounded-card flex gap-3">
                <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary flex-shrink-0"><i data-lucide="tag" class="w-4 h-4"></i></div>
                <div>
                    <h4 class="text-small font-bold">Giảm giá phòng!</h4>
                    <p class="text-[11px] text-textSecondary">Căn hộ Flora Novia giảm sâu 2tr/tháng cho hợp đồng ký trong tuần này.</p>
                    <span class="text-[10px] text-textSecondary block pt-1">5 phút trước</span>
                </div>
            </div>
            <div class="p-3 bg-surface border border-border rounded-card flex gap-3">
                <div class="w-8 h-8 rounded-full bg-success/10 flex items-center justify-center text-success flex-shrink-0"><i data-lucide="check-circle" class="w-4 h-4"></i></div>
                <div>
                    <h4 class="text-small font-bold">Xác thực thành công</h4>
                    <p class="text-[11px] text-textSecondary">Hồ sơ cá nhân của bạn đã được xác minh chính chủ thành công.</p>
                    <span class="text-[10px] text-textSecondary block pt-1">2 giờ trước</span>
                </div>
            </div>
        </div>
    </div>
    <script>lucide.createIcons()</script>
</body>
</html>
