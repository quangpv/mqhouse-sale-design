const allStories = {}
epics.forEach(epic => {
  epic.stories.forEach(st => {
    allStories[st.id] = { ...st, epicName: epic.name }
  })
})

function parseStoryIds(content) {
  const ids = []
  const parts = content.split(' + ')
  for (const part of parts) {
    const epic = epics.find(e => e.id === part)
    if (epic) { epic.stories.forEach(st => ids.push(st.id)); continue }
    const m = part.match(/^([A-Z]+)-(\d+)→(\d+)((?:,\d+)*)$/)
    if (m) {
      const p = m[1], start = +m[2], end = +m[3]
      for (let i = start; i <= end; i++) ids.push(p + '-' + String(i).padStart(2,'0'))
      if (m[4]) m[4].split(',').filter(Boolean).forEach(n => ids.push(p + '-' + String(+n).padStart(2,'0')))
    }
  }
  return ids
}

function Badge(text, variant='gray') {
  const colors = { gray:'bg-gray-100 text-gray-700', blue:'bg-blue-100 text-blue-700', green:'bg-green-100 text-green-700', red:'bg-red-100 text-red-700', yellow:'bg-yellow-100 text-yellow-700', indigo:'bg-indigo-100 text-indigo-700', orange:'bg-orange-100 text-orange-700', purple:'bg-purple-100 text-purple-700' }
  return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${colors[variant]||colors.gray}">${text}</span>`
}

function MetricCard(icon, label, value, sub) {
  return `<div class="bg-white rounded-xl border border-gray-200 p-4 sm:p-5 flex items-center gap-4">
    <div class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center flex-shrink-0"><i data-lucide="${icon}" class="w-5 h-5 text-indigo-600"></i></div>
    <div class="min-w-0"><p class="text-xs font-medium text-gray-500 uppercase tracking-wide truncate">${label}</p><p class="text-xl sm:text-2xl font-bold text-gray-900">${value}</p>${sub ? `<p class="text-xs text-gray-400">${sub}</p>` : ''}</div>
  </div>`
}

function Table(headers, rows, compact) {
  if (!rows.length) return '<p class="text-sm text-gray-400 italic py-4">Không có dữ liệu</p>'
  return `<div class="overflow-x-auto"><table class="w-full text-sm ${compact ? '' : 'border-collapse'}">
    <thead><tr class="border-b border-gray-200">${headers.map(h => `<th class="text-left font-semibold text-gray-600 ${compact ? 'px-2 py-1.5' : 'px-4 py-3'} whitespace-nowrap text-xs uppercase tracking-wider">${h}</th>`).join('')}</tr></thead>
    <tbody class="divide-y divide-gray-100">${rows.map(r => `<tr class="hover:bg-gray-50">${r.map((c,i) => `<td class="${compact ? 'px-2 py-1.5' : 'px-4 py-3'} ${i===0 ? 'font-medium text-gray-900' : 'text-gray-600'} whitespace-nowrap">${c}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div>`
}

function Accordion(items, renderContent, defaultOpen) {
  return items.map((item,idx) => {
    const open = defaultOpen && idx < defaultOpen
    return `<details class="group bg-white rounded-xl border border-gray-200 overflow-hidden ${idx>0 ? 'mt-2' : ''}" ${open ? 'open' : ''}>
      <summary class="flex items-center justify-between px-4 py-3 sm:px-5 sm:py-4 cursor-pointer hover:bg-gray-50 transition-colors list-none [&::-webkit-details-marker]:hidden">
        ${typeof item === 'string' ? `<span class="font-medium text-gray-900">${item}</span>` : `<div class="flex items-center gap-3 min-w-0"><span class="text-xs font-mono font-bold text-indigo-600 flex-shrink-0">${item.id||''}</span><span class="font-medium text-gray-900 truncate">${item.name||item}</span>${item.priority ? Badge(item.priority, item.priority==='High'?'red':item.priority==='Medium'?'yellow':'gray') : ''}</div>`}
        <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400 group-open:rotate-180 transition-transform flex-shrink-0"></i>
      </summary>
      <div class="px-4 sm:px-5 pb-4 sm:pb-5 border-t border-gray-100 pt-3">${renderContent(item)}</div>
    </details>`
  }).join('')
}

function renderEpicView() {
  let html = '<div class="space-y-6">'

  ${Table(['ID','Vai trò','Mô tả'], roles.map(r => [`<span class="font-mono text-indigo-600">${r.id}</span>`,r.name,r.desc]))}</section>`

  // Matrix
  html += `<section><h2 class="text-lg font-bold text-gray-900 mb-3 flex items-center gap-2"><i data-lucide="grid-3x3" class="w-5 h-5 text-indigo-600"></i> Ma trận Role - Epic</h2>
  <div class="overflow-x-auto rounded-xl border border-gray-200 bg-white">${Table(epicMatrix.headers, epicMatrix.rows, true)}</div>
  <p class="text-xs text-gray-400 mt-1">C=Create, R=Read, U=Update, D=Delete, ĐK=Đăng ký, KV=Khu vực, TT=Trạng thái</p></section>`

  // Dependency
  html += `<section><h2 class="text-lg font-bold text-gray-900 mb-3 flex items-center gap-2"><i data-lucide="git-branch" class="w-5 h-5 text-indigo-600"></i> Phụ thuộc Epic</h2>
  <div class="overflow-x-auto rounded-xl border border-gray-200 bg-white">${Table(['Epic','Phụ thuộc vào','Được phụ thuộc bởi'], epicDeps.map(d => [d.epic,d.dep,d.dependents]), true)}</div></section>`

  // Phase legend
  const phases = [{num:1,name:'Foundation',color:'bg-red-50 border-red-200 text-red-700'},{num:2,name:'Core',color:'bg-blue-50 border-blue-200 text-blue-700'},{num:3,name:'Experience',color:'bg-green-50 border-green-200 text-green-700'},{num:4,name:'Engagement',color:'bg-purple-50 border-purple-200 text-purple-700'}]
  html += `<section><h2 class="text-lg font-bold text-gray-900 mb-3 flex items-center gap-2"><i data-lucide="layers" class="w-5 h-5 text-indigo-600"></i> Pha triển khai</h2>
  <div class="flex flex-wrap gap-2">${phases.map(p => `<span class="px-3 py-1.5 rounded-lg text-xs font-medium border ${p.color}">Phase ${p.num}: ${p.name}</span>`).join('')}</div></section>`

  // Epics
  const phaseColors = { 1:'border-l-red-500', 2:'border-l-blue-500', 3:'border-l-green-500', 4:'border-l-purple-500' }
  html += `<section><h2 class="text-lg font-bold text-gray-900 mb-3 flex items-center gap-2"><i data-lucide="book-open" class="w-5 h-5 text-indigo-600"></i> Danh sách Epic (13)</h2>`
  html += Accordion(epics, epic => {
    if (!epic.stories || !epic.stories.length) return '<p class="text-sm text-gray-400 italic">Chưa có stories</p>'
    return `<p class="text-sm text-gray-600 mb-3">${epic.desc} <span class="text-xs text-gray-400">(Phụ thuộc: ${epic.dep})</span></p>
    ${Accordion(epic.stories, st => {
      return `<div class="space-y-3">
        <p class="text-sm text-gray-700">${st.desc}</p>
        <p class="text-xs text-gray-500"><span class="font-medium">Role:</span> ${st.role}</p>
        ${st.ac.length ? `<div><p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Acceptance Criteria</p><ul class="space-y-1">${st.ac.map(a => `<li class="flex items-start gap-2 text-sm text-gray-600"><input type="checkbox" disabled class="mt-0.5 rounded border-gray-300 text-indigo-600"><span>${a}</span></li>`).join('')}</ul></div>` : ''}
        ${st.tasks.length ? `<div><p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Technical Tasks</p>${Table(['Nhóm','Task'], st.tasks, true)}</div>` : ''}
      </div>`
    }, 0)}
    <div class="mt-2 flex items-center justify-between text-xs text-gray-400"><span>${epic.stories.length} stories</span><span class="text-indigo-600 font-medium">Priority: ${epic.stories.filter(s=>s.priority==='High').length} High</span></div>`
  }, 1)

  html += '</section></div>'
  return html
}

  const phaseColors = {dev:'bg-indigo-500', test:'bg-emerald-500', release:'bg-amber-500'}

    <h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2"><i data-lucide="calendar" class="w-5 h-5 text-indigo-600"></i> Tổng quan Timeline</h2>

          return `<div class="flex-1 text-center truncate px-0.5" title="${s.demo}">▸ ${s.demo}</div>`

      </div>
    </div>
  </div>`

  // Sprints
  html += `<section><h2 class="text-lg font-bold text-gray-900 mb-3 flex items-center gap-2"><i data-lucide="list-checks" class="w-5 h-5 text-indigo-600"></i> Chi tiết Sprint</h2>
  <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">${tlSprints.map(s => {
    const phaseColors = {dev:'border-l-indigo-500', test:'border-l-emerald-500', release:'border-l-amber-500'}
    const phaseLabels = {dev:'Dev', test:'Test', release:'Release'}
    const storyIds = parseStoryIds(s.content)
    const stories = storyIds.map(id => allStories[id]).filter(Boolean)
    return `<div class="bg-white rounded-xl border border-gray-200 border-l-4 ${phaseColors[s.phase]} p-4">
      <div class="flex items-center justify-between mb-2"><h3 class="font-bold text-gray-900">${s.id}</h3>${Badge(phaseLabels[s.phase], s.phase==='dev'?'indigo':s.phase==='test'?'green':'orange')}</div>
      <p class="text-xs text-gray-500 mb-1"><span class="font-medium">Thời gian:</span> ${s.start} → ${s.end}</p>
      <p class="text-xs text-gray-500 mb-1"><span class="font-medium">Demo:</span> ${s.demo}</p>
      <p class="text-xs text-gray-600 mb-2">${s.content}</p>
      <p class="text-xs font-medium text-indigo-600 mb-2">🎯 ${s.milestone}</p>
      ${stories.length ? `<details class="border-t border-gray-100 pt-2 mt-2 group">
        <summary class="flex items-center justify-between cursor-pointer hover:text-indigo-600 transition-colors list-none [&::-webkit-details-marker]:hidden">

        </summary>
        <div class="mt-2 space-y-2">${stories.map(st => `<div class="text-xs"><div class="flex items-start gap-1.5"><span class="font-mono font-bold text-indigo-500 flex-shrink-0">${st.id}</span><span class="text-gray-700">${st.desc}</span></div><span class="inline-block mt-0.5 ml-4 px-1.5 py-0.5 rounded bg-gray-100 text-gray-500 text-[10px]">${st.role}</span></div>`).join('')}</div>
      </details>` : ''}

  }).join('')}</div></section>`

  // Milestones + Demos
  const mdRows = demos.map(d => {
    const m = milestones.find(ms => ms.date === d.date)
    return [d.date, `<span class="font-mono text-indigo-600">${d.sprint}</span>`, m ? m.desc : '', d.content]

  // Holidays
  html += `<section><h2 class="text-lg font-bold text-gray-900 mb-3 flex items-center gap-2"><i data-lucide="calendar-off" class="w-5 h-5 text-indigo-600"></i> Lịch nghỉ lễ</h2>
  ${Table(['Ngày','Dịp','Ghi chú'], holidays.map(h => [h.date,h.event,h.note]))}</section>`

  html += '</div>'
  return html
}

function init() {
  const tabs = [
    { id:'epic', label:'Epics & Stories', icon:'book-open', render:renderEpicView },
    { id:'timeline', label:'Timeline', icon:'calendar', render:renderTimelineView }
  ]

  const tabsEl = document.getElementById('tabs')
  const contentEl = document.getElementById('tab-content')

  let activeTab = sessionStorage.getItem('activeTab') || 'epic'

  function switchTab(tabId) {
    activeTab = tabId
    sessionStorage.setItem('activeTab', tabId)
    renderTabs()
    const tab = tabs.find(t => t.id === tabId)
    contentEl.innerHTML = tab.render()
    contentEl.scrollTop = 0
    lucide.createIcons()
  }

  function renderTabs() {
    tabsEl.innerHTML = tabs.map(t => `<button class="tab-btn px-4 sm:px-5 py-3 text-sm font-medium border-b-2 transition-colors flex items-center gap-2 whitespace-nowrap ${activeTab === t.id ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}" data-tab="${t.id}"><i data-lucide="${t.icon}" class="w-4 h-4"></i><span class="hidden sm:inline">${t.label}</span></button>`).join('')
    tabsEl.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)))
  }

  renderTabs()
  switchTab(activeTab)
}

document.addEventListener('DOMContentLoaded', init)
</script>
