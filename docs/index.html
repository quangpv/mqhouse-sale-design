const allStories = {}
epics.forEach(epic => {
  epic.stories.forEach(st => {
    allStories[st.id] = { ...st, epicName: epic.name }
  })
})

function parseStoryIds(content) {
  const ids = []
  const parts = content.split(' + ')
  for (const part of parts) {
    const epic = epics.find(e => e.id === part)
    if (epic) { epic.stories.forEach(st => ids.push(st.id)); continue }
    const m = part.match(/^([A-Z]+)-(\d+)→(\d+)((?:,\d+)*)$/)
    if (m) {
      const p = m[1], start = +m[2], end = +m[3]
      for (let i = start; i <= end; i++) ids.push(p + '-' + String(i).padStart(2,'0'))
      if (m[4]) m[4].split(',').filter(Boolean).forEach(n => ids.push(p + '-' + String(+n).padStart(2,'0')))
    }
  }
  return ids
}

function Badge(text, variant='gray') {
  const colors = { gray:'bg-gray-100 text-gray-700', blue:'bg-blue-100 text-blue-700', green:'bg-green-100 text-green-700', red:'bg-red-100 text-red-700', yellow:'bg-yellow-100 text-yellow-700', indigo:'bg-indigo-100 text-indigo-700', orange:'bg-orange-100 text-orange-700', purple:'bg-purple-100 text-purple-700' }
  return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${colors[variant]||colors.gray}">${text}</span>`
}

function MetricCard(icon, label, value, sub) {
  return `<div class="bg-white rounded-xl border border-gray-200 p-4 sm:p-5 flex items-center gap-4">
    <div class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center flex-shrink-0"><i data-lucide="${icon}" class="w-5 h-5 text-indigo-600"></i></div>
    <div class="min-w-0"><p class="text-xs font-medium text-gray-500 uppercase tracking-wide truncate">${label}</p><p class="text-xl sm:text-2xl font-bold text-gray-900">${value}</p>${sub ? `<p class="text-xs text-gray-400">${sub}</p>` : ''}</div>
  </div>`
}

function Table(headers, rows, compact) {
  if (!rows.length) return '<p class="text-sm text-gray-400 italic py-4">Không có dữ liệu</p>'
  return `<div class="overflow-x-auto"><table class="w-full text-sm ${compact ? '' : 'border-collapse'}">
    <thead><tr class="border-b border-gray-200">${headers.map(h => `<th class="text-left font-semibold text-gray-600 ${compact ? 'px-2 py-1.5' : 'px-4 py-3'} whitespace-nowrap text-xs uppercase tracking-wider">${h}</th>`).join('')}</tr></thead>
    <tbody class="divide-y divide-gray-100">${rows.map(r => `<tr class="hover:bg-gray-50">${r.map((c,i) => `<td class="${compact ? 'px-2 py-1.5' : 'px-4 py-3'} ${i===0 ? 'font-medium text-gray-900' : 'text-gray-600'} whitespace-nowrap">${c}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div>`
}

function Accordion(items, renderContent, defaultOpen) {
  return items.map((item,idx) => {
    const open = defaultOpen && idx < defaultOpen
    return `<details class="group bg-white rounded-xl border border-gray-200 overflow-hidden ${idx>0 ? 'mt-2' : ''}" ${open ? 'open' : ''}>
      <summary class="flex items-center justify-between px-4 py-3 sm:px-5 sm:py-4 cursor-pointer hover:bg-gray-50 transition-colors list-none [&::-webkit-details-marker]:hidden">
        ${typeof item === 'string' ? `<span class="font-medium text-gray-900">${item}</span>` : `<div class="flex items-center gap-3 min-w-0"><span class="text-xs font-mono font-bold text-indigo-600 flex-shrink-0">${item.id||''}</span><span class="font-medium text-gray-900 truncate">${item.name||item}</span>${item.priority ? Badge(item.priority, item.priority==='High'?'red':item.priority==='Medium'?'yellow':'gray') : ''}</div>`}
        <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400 group-open:rotate-180 transition-transform flex-shrink-0"></i>
      </summary>
      <div class="px-4 sm:px-5 pb-4 sm:pb-5 border-t border-gray-100 pt-3">${renderContent(item)}</div>
    </details>`
  }).join('')
}

function init() {
  const tabs = [
    { id:'epic', label:'Epics & Câu chuyện', icon:'book-open', render:renderEpicView },
    { id:'timeline', label:'Tiến độ', icon:'calendar', render:renderTimelineView }
  ]

  const tabsEl = document.getElementById('tabs')
  const contentEl = document.getElementById('tab-content')

  let activeTab = sessionStorage.getItem('activeTab') || 'epic'

  function switchTab(tabId) {
    activeTab = tabId
    sessionStorage.setItem('activeTab', tabId)
    renderTabs()
    const tab = tabs.find(t => t.id === tabId)
    contentEl.innerHTML = tab.render()
    contentEl.scrollTop = 0
    lucide.createIcons()
  }

  function renderTabs() {
    tabsEl.innerHTML = tabs.map(t => `<button class="tab-btn px-4 sm:px-5 py-3 text-sm font-medium border-b-2 transition-colors flex items-center gap-2 whitespace-nowrap ${activeTab === t.id ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}" data-tab="${t.id}"><i data-lucide="${t.icon}" class="w-4 h-4"></i><span class="hidden sm:inline">${t.label}</span></button>`).join('')
    tabsEl.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)))
  }

  renderTabs()
  switchTab(activeTab)
}

document.addEventListener('DOMContentLoaded', init)
</script>
